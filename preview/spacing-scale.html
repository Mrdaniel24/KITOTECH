<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing — Scale</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px 28px; }
  .row { display: grid; grid-template-columns: 80px 1fr 80px; align-items: center; gap: 12px; padding: 4px 0; }
  .tok { font: 500 12px/1 var(--font-mono); color: var(--fg-on-light-1); }
  .bar { height: 10px; background: var(--brand-red); border-radius: 2px; }
  .px { font: 500 12px/1 var(--font-mono); color: var(--fg-on-light-3); text-align: right; }
</style>
</head><body>
  <div class="row"><span class="tok">s-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row"><span class="tok">s-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="tok">s-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row"><span class="tok">s-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row"><span class="tok">s-6</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
  <div class="row"><span class="tok">s-8</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
  <div class="row"><span class="tok">s-12</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
  <div class="row"><span class="tok">s-16</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
  <div class="row"><span class="tok">s-24</span><div class="bar" style="width:96px"></div><span class="px">96px</span></div>
  <div class="row"><span class="tok">s-32</span><div class="bar" style="width:128px"></div><span class="px">128px</span></div>
</body></html>
