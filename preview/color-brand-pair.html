<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Brand pairing</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; display: grid; grid-template-columns: 1fr 1fr; }
  .swatch { display: grid; place-items: center; min-height: 200px; padding: 24px; position: relative; }
  .red { background: var(--brand-red); }
  .blue { background: var(--brand-blue); }
  .swatch .name { font: 600 22px/1.2 var(--font-display); color: #fff; letter-spacing: -0.01em; }
  .swatch .hex { position: absolute; bottom: 12px; left: 16px; font: 500 11px/1 var(--font-mono); color: rgba(255,255,255,0.7); letter-spacing: 0.16em; text-transform: uppercase; }
  .swatch .role { position: absolute; top: 12px; right: 16px; font: 500 10px/1 var(--font-mono); color: rgba(255,255,255,0.7); letter-spacing: 0.16em; text-transform: uppercase; }
</style>
</head><body>
  <div class="swatch red">
    <div class="name">Signal Red</div>
    <div class="role">Action · alert</div>
    <div class="hex">#E1141C</div>
  </div>
  <div class="swatch blue">
    <div class="name">Trust Blue</div>
    <div class="role">Trust · info</div>
    <div class="hex">#1A37D5</div>
  </div>
</body></html>
