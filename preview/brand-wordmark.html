<!doctype html>
<html><head><meta charset="utf-8"><title>Brand — Horizontal Logo</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; display: flex; flex-direction: column; }
  .panel { padding: 18px 28px; display: flex; align-items: center; }
  .panel.dark { background: var(--ink-0); }
  .panel.light { background: var(--paper-1); border-top: 1px solid var(--hair-l); }
  .panel img { height: 56px; }
  .lab { font: 500 11px/1 var(--font-mono); text-transform: uppercase; letter-spacing: 0.16em; margin-left: auto; }
  .dark .lab { color: var(--fg-on-dark-3); }
  .light .lab { color: var(--fg-on-light-3); }
</style>
</head><body>
  <div class="panel light"><img src="../assets/logo-horizontal-light.png" alt=""><div class="lab">Light bg lockup</div></div>
  <div class="panel dark"><img src="../assets/logo-horizontal-dark.png" alt=""><div class="lab">Dark bg lockup</div></div>
</body></html>
