<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Trust Blue</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px 28px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 96px; border-radius: 8px; border: 1px solid var(--hair-l); position: relative; overflow: hidden; }
  .chip.light-on-dark { background: var(--ink-1); display: grid; place-items: center; }
  .chip.light-on-dark::after { content: ""; width: 60%; height: 60%; background: var(--brand-blue-light); border-radius: 4px; }
  .lab { font: 500 11px/1.2 var(--font-mono); text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-on-light-2); }
  .hex { font: 500 12px/1.2 var(--font-mono); color: var(--fg-on-light-1); }
</style>
</head><body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--brand-blue)"></div><div class="lab">Trust · default</div><div class="hex">#1A37D5</div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-blue-hot)"></div><div class="lab">Hot · hover</div><div class="hex">#2C4DF5</div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-blue-deep)"></div><div class="lab">Deep · pressed</div><div class="hex">#12259B</div></div>
    <div class="sw"><div class="chip light-on-dark"></div><div class="lab">On dark · light blue</div><div class="hex">#A8B4FF</div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-blue-tint)"></div><div class="lab">Tint · bg</div><div class="hex">rgba(.06)</div></div>
  </div>
</body></html>
