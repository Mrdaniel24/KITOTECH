<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Headings</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px 28px; }
  .row { display: grid; grid-template-columns: 60px 1fr 140px; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid var(--hair-l); }
  .row:last-child { border-bottom: none; }
  .tag { font: var(--mono-sm); color: var(--fg-on-light-3); }
  .h1 { font: 600 40px/1.1 var(--font-display); letter-spacing: -0.01em; }
  .h2 { font: 600 28px/1.18 var(--font-display); letter-spacing: -0.01em; }
  .h3 { font: 600 20px/1.25 var(--font-display); letter-spacing: -0.005em; }
  .h4 { font: 600 16px/1.3 var(--font-display); }
</style>
</head><body>
  <div class="row"><span class="tag">H1</span><span class="h1">Sentinel Access OS</span><span class="tag">40 / 600</span></div>
  <div class="row"><span class="tag">H2</span><span class="h2">Live event monitoring</span><span class="tag">28 / 600</span></div>
  <div class="row"><span class="tag">H3</span><span class="h3">Camera channel · East gate</span><span class="tag">20 / 600</span></div>
  <div class="row"><span class="tag">H4</span><span class="h4">Door 4 — entrance hall</span><span class="tag">16 / 600</span></div>
</body></html>
