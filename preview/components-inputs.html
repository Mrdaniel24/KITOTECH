<!doctype html>
<html><head><meta charset="utf-8"><title>Form fields</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .col { display: flex; flex-direction: column; gap: 6px; }
  label { font: 500 12px/1.2 var(--font-body); color: var(--fg-on-light-2); }
  .input { display: flex; align-items: center; height: 40px; padding: 0 12px; border: 1px solid var(--hair-l2); border-radius: 4px; background: var(--paper-0); font: 400 14px/1 var(--font-body); color: var(--fg-on-light-1); transition: all 220ms cubic-bezier(0.22,1,0.36,1); }
  .input.focus { border-color: var(--brand-red); box-shadow: 0 0 0 3px var(--brand-red-tint); }
  .input.error { border-color: var(--brand-red); }
  .helper { font: 400 12px/1.3 var(--font-body); color: var(--fg-on-light-3); }
  .helper.err { color: var(--brand-red); }
  .placeholder { color: var(--fg-on-light-4); }
  .check { display: flex; align-items: center; gap: 10px; font: 400 14px/1 var(--font-body); }
  .box { width: 18px; height: 18px; border: 1px solid var(--hair-l2); border-radius: 2px; background: var(--paper-0); position: relative; }
  .box.on { background: var(--brand-red); border-color: var(--brand-red); }
  .box.on::after { content: ""; position: absolute; left: 5px; top: 2px; width: 4px; height: 9px; border-right: 1.5px solid #fff; border-bottom: 1.5px solid #fff; transform: rotate(45deg); }
  .switch { width: 36px; height: 20px; border-radius: 999px; background: var(--paper-3); position: relative; transition: background 220ms; }
  .switch.on { background: var(--brand-red); }
  .switch::after { content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 999px; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.18); transition: left 220ms cubic-bezier(0.22,1,0.36,1); }
  .switch.on::after { left: 18px; }
</style>
</head><body>
  <div class="col">
    <label>Email</label>
    <div class="input"><span>operator@kitotech.com</span></div>
    <div class="helper">We'll never share this.</div>

    <label style="margin-top:8px">Password</label>
    <div class="input focus"><span class="placeholder">•••••••••</span></div>
    <div class="helper">Focus ring uses red tint.</div>
  </div>
  <div class="col">
    <label>API key</label>
    <div class="input error"><span style="font-family:var(--font-mono); font-size:12px;">kt_live_4c8a2b…</span></div>
    <div class="helper err">Key rotated 14 minutes ago.</div>

    <div class="check" style="margin-top:12px"><div class="box on"></div>Enable two-factor auth</div>
    <div class="check"><div class="switch on"></div>Receive alert push notifications</div>
  </div>
</body></html>
