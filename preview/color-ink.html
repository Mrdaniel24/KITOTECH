<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Ink (Dark Surfaces)</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px 28px; background: var(--ink-1); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 96px; border-radius: 8px; border: 1px solid var(--hair-d); }
  .lab { font: 500 11px/1.2 var(--font-mono); text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-on-dark-2); }
  .hex { font: 500 12px/1.2 var(--font-mono); color: var(--fg-on-dark-1); }
</style>
</head><body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--ink-0)"></div><div class="lab">ink-0 · base</div><div class="hex">#050507</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-1)"></div><div class="lab">ink-1 · surface</div><div class="hex">#0A0A0C</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-2)"></div><div class="lab">ink-2 · card</div><div class="hex">#111114</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-3)"></div><div class="lab">ink-3 · hover</div><div class="hex">#18181D</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-4)"></div><div class="lab">ink-4 · pressed</div><div class="hex">#1F1F25</div></div>
  </div>
</body></html>
