<!doctype html>
<html><head><meta charset="utf-8"><title>Brand — Logo Deliverables</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 18px 24px; }
  .head { font: 500 11px/1 var(--font-mono); text-transform: uppercase; letter-spacing: 0.16em; color: var(--fg-on-light-3); margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 8px 10px; border-bottom: 1px solid var(--hair-l); vertical-align: middle; }
  td:last-child { border-bottom: none; }
  tr:last-child td { border-bottom: none; }
  .file { font: 500 12px/1 var(--font-mono); color: var(--fg-on-light-1); }
  .role { font: 500 11px/1 var(--font-mono); color: var(--fg-on-light-3); text-transform: uppercase; letter-spacing: 0.1em; }
  .formats { display: flex; gap: 6px; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font: 500 10px/1 var(--font-mono); letter-spacing: 0.1em; }
  .pill.svg { background: var(--brand-red-tint); color: var(--brand-red); }
  .pill.png { background: var(--brand-blue-tint); color: var(--brand-blue); }
</style>
</head><body>
  <div class="head">Available files · /assets</div>
  <table>
    <tr><td class="file">logo-horizontal</td><td class="role">Full lockup · transparent</td><td><div class="formats"><span class="pill svg">SVG</span><span class="pill png">PNG</span></div></td></tr>
    <tr><td class="file">logo-horizontal-light</td><td class="role">Full lockup · white bg</td><td><div class="formats"><span class="pill svg">SVG</span><span class="pill png">PNG</span></div></td></tr>
    <tr><td class="file">logo-horizontal-dark</td><td class="role">Full lockup · ink bg</td><td><div class="formats"><span class="pill svg">SVG</span><span class="pill png">PNG</span></div></td></tr>
    <tr><td class="file">logo-mark</td><td class="role">Icon only · red</td><td><div class="formats"><span class="pill svg">SVG</span><span class="pill png">PNG</span></div></td></tr>
    <tr><td class="file">logo-mark-white</td><td class="role">Icon only · white</td><td><div class="formats"><span class="pill svg">SVG</span><span class="pill png">PNG</span></div></td></tr>
  </table>
</body></html>
