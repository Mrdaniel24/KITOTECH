<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing — Radii</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px 28px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; }
  .sw { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 80px; height: 80px; background: var(--ink-1); border: 1px solid var(--hair-d); }
  .tok { font: 500 11px/1.2 var(--font-mono); color: var(--fg-on-light-1); }
  .px { font: 500 11px/1 var(--font-mono); color: var(--fg-on-light-3); }
</style>
</head><body>
  <div class="grid">
    <div class="sw"><div class="box" style="border-radius:0"></div><div class="tok">r-0</div><div class="px">0px</div></div>
    <div class="sw"><div class="box" style="border-radius:2px"></div><div class="tok">r-1</div><div class="px">2px</div></div>
    <div class="sw"><div class="box" style="border-radius:4px"></div><div class="tok">r-2</div><div class="px">4px</div></div>
    <div class="sw"><div class="box" style="border-radius:8px"></div><div class="tok">r-3</div><div class="px">8px</div></div>
    <div class="sw"><div class="box" style="border-radius:12px"></div><div class="tok">r-4</div><div class="px">12px</div></div>
    <div class="sw"><div class="box" style="border-radius:999px"></div><div class="tok">r-pill</div><div class="px">999</div></div>
  </div>
</body></html>
