<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Mono & Numerals</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px 28px; background: var(--ink-1); color: var(--fg-on-dark-1); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .stat { display: flex; flex-direction: column; gap: 4px; padding: 14px 16px; border: 1px solid var(--hair-d); border-radius: 8px; background: var(--ink-2); }
  .num { font: 500 28px/1 var(--font-mono); font-feature-settings: "tnum" 1, "zero" 1; letter-spacing: -0.02em; }
  .lab { font: var(--mono-sm); color: var(--fg-on-dark-3); text-transform: uppercase; letter-spacing: 0.14em; }
  .red { color: var(--brand-red); }
  .footer { margin-top: 18px; font: 500 13px/1.3 var(--font-mono); color: var(--fg-on-dark-2); }
  .dot { display:inline-block; width:6px; height:6px; border-radius:999px; background: var(--brand-red); margin-right: 6px; vertical-align: middle; }
</style>
</head><body>
  <div class="grid">
    <div class="stat"><div class="lab">Channels</div><div class="num">1,240</div></div>
    <div class="stat"><div class="lab">Latency</div><div class="num">78<span style="font-size:14px;color:var(--fg-on-dark-3);"> ms</span></div></div>
    <div class="stat"><div class="lab">Uptime</div><div class="num">99.99<span style="font-size:14px;color:var(--fg-on-dark-3);">%</span></div></div>
  </div>
  <div class="footer"><span class="dot"></span>LIVE · 14:02:47 UTC · JetBrains Mono</div>
</body></html>
