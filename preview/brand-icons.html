<!doctype html>
<html><head><meta charset="utf-8"><title>Brand — Iconography</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px 28px; }
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 18px; margin-bottom: 14px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--fg-on-light-1); }
  .ic svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: square; stroke-linejoin: miter; }
  .lab { font: 500 10px/1 var(--font-mono); color: var(--fg-on-light-3); text-transform: uppercase; letter-spacing: 0.08em; }
  .note { font: 500 11px/1.4 var(--font-mono); color: var(--fg-on-light-3); text-transform: uppercase; letter-spacing: 0.14em; }
</style>
</head><body>
  <div class="row">
    <div class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="12" rx="1"/><circle cx="12" cy="12" r="3"/><circle cx="17" cy="9" r="0.5" fill="#E60E1B" stroke="#E60E1B"/></svg><span class="lab">camera</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="1"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg><span class="lab">lock</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 2L3 6v6c0 5 4 9 9 10 5-1 9-5 9-10V6z"/></svg><span class="lab">shield</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M4 5h16v14H4z"/><path d="M4 9h16M9 5v14"/></svg><span class="lab">grid</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg><span class="lab">clock</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M3 12h4l3-8 4 16 3-8h4"/></svg><span class="lab">activity</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg><span class="lab">user</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 3v6m0 6v6M3 12h6m6 0h6"/></svg><span class="lab">scope</span></div>
  </div>
  <div class="row">
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M3 10l9-7 9 7v10a1 1 0 0 1-1 1h-5v-7H10v7H4a1 1 0 0 1-1-1z"/></svg><span class="lab">facility</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M4 17V7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10"/><rect x="2" y="17" width="20" height="4" rx="1"/></svg><span class="lab">server</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 1 1-14 0 7 7 0 0 1 14 0z"/><path d="M12 5v2M12 17v2M5 12h2M17 12h2"/></svg><span class="lab">aperture</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/><circle cx="12" cy="12" r="6"/></svg><span class="lab">target</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M3 7l9-4 9 4-9 4z"/><path d="M3 12l9 4 9-4M3 17l9 4 9-4"/></svg><span class="lab">layers</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg><span class="lab">globe</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg><span class="lab">check</span></div>
    <div class="ic" style="color:var(--brand-red)"><svg viewBox="0 0 24 24"><path d="M12 2l10 18H2L12 2z"/><path d="M12 10v4M12 17v0.5"/></svg><span class="lab">alert</span></div>
  </div>
  <div class="note">Lucide · 1.5px stroke · 24px nominal · proposed substitution</div>
</body></html>
