<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Foreground</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; display: grid; grid-template-columns: 1fr 1fr; }
  .half { padding: 20px 24px; display: flex; flex-direction: column; gap: 10px; }
  .half.dark { background: var(--ink-1); }
  .h { font: var(--mono-sm); text-transform: uppercase; letter-spacing: 0.16em; color: var(--fg-on-light-3); margin-bottom: 4px; }
  .dark .h { color: var(--fg-on-dark-3); }
  .row { display: flex; align-items: center; gap: 10px; font: 500 14px/1.2 var(--font-body); }
  .swatch { width: 18px; height: 18px; border-radius: 4px; border: 1px solid var(--hair-l); }
  .dark .swatch { border-color: var(--hair-d); }
  .mono { font: 500 11px/1 var(--font-mono); margin-left: auto; }
  .light-1 { color: var(--fg-on-light-1); }
  .light-2 { color: var(--fg-on-light-2); }
  .light-3 { color: var(--fg-on-light-3); }
  .light-4 { color: var(--fg-on-light-4); }
  .dark-1 { color: var(--fg-on-dark-1); }
  .dark-2 { color: var(--fg-on-dark-2); }
  .dark-3 { color: var(--fg-on-dark-3); }
  .dark-4 { color: var(--fg-on-dark-4); }
</style>
</head><body>
  <div class="half">
    <div class="h">On light</div>
    <div class="row"><span class="swatch" style="background:var(--fg-on-light-1)"></span><span class="light-1">Primary text</span><span class="mono light-3">#0A0A0C</span></div>
    <div class="row"><span class="swatch" style="background:var(--fg-on-light-2)"></span><span class="light-2">Secondary</span><span class="mono light-3">#4A4A50</span></div>
    <div class="row"><span class="swatch" style="background:var(--fg-on-light-3)"></span><span class="light-3">Tertiary / meta</span><span class="mono light-3">#76767D</span></div>
    <div class="row"><span class="swatch" style="background:var(--fg-on-light-4)"></span><span class="light-4">Disabled</span><span class="mono light-3">#A8A8AE</span></div>
  </div>
  <div class="half dark">
    <div class="h">On dark</div>
    <div class="row"><span class="swatch" style="background:var(--fg-on-dark-1)"></span><span class="dark-1">Primary text</span><span class="mono dark-3">#FAFAF9</span></div>
    <div class="row"><span class="swatch" style="background:var(--fg-on-dark-2)"></span><span class="dark-2">Secondary</span><span class="mono dark-3">#B8B8BD</span></div>
    <div class="row"><span class="swatch" style="background:var(--fg-on-dark-3)"></span><span class="dark-3">Tertiary / meta</span><span class="mono dark-3">#6F6F76</span></div>
    <div class="row"><span class="swatch" style="background:var(--fg-on-dark-4)"></span><span class="dark-4">Disabled</span><span class="mono dark-3">#4A4A50</span></div>
  </div>
</body></html>
