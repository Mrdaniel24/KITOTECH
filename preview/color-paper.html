<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Paper (Light Surfaces)</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px 28px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 96px; border-radius: 8px; border: 1px solid var(--hair-l); }
  .lab { font: 500 11px/1.2 var(--font-mono); text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-on-light-2); }
  .hex { font: 500 12px/1.2 var(--font-mono); color: var(--fg-on-light-1); }
</style>
</head><body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--paper-0)"></div><div class="lab">paper-0 · pure</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-1)"></div><div class="lab">paper-1 · base</div><div class="hex">#FAFAF9</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-2)"></div><div class="lab">paper-2 · panel</div><div class="hex">#F2F2F1</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-3)"></div><div class="lab">paper-3 · pressed</div><div class="hex">#E9E9E8</div></div>
  </div>
</body></html>
