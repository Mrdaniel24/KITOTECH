<!doctype html>
<html><head><meta charset="utf-8"><title>Navigation</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; background: var(--ink-1); }
  .frame { position: relative; height: 240px; background:
    radial-gradient(circle at 30% 20%, rgba(225,20,28,0.18), transparent 50%),
    radial-gradient(circle at 70% 80%, rgba(26,55,213,0.16), transparent 50%),
    var(--ink-0);
    background-size: cover; overflow: hidden; }
  .frame::before { content: ""; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 48px 48px; }
  .nav { position: relative; display: flex; align-items: center; gap: 32px; height: 64px; padding: 0 24px; background: rgba(5,5,7,0.55); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--hair-d); }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .mark { width: 36px; height: 36px; display: grid; place-items: center; }
  .brand .mark img { width: 30px; height: auto; display: block; }
  .brand .word { font: 600 14px/1 var(--font-display); letter-spacing: 0.1em; color: var(--fg-on-dark-1); }
  .links { display: flex; gap: 22px; }
  .links a { font: 500 13px/1 var(--font-body); color: var(--fg-on-dark-2); text-decoration: none; }
  .links a.active { color: var(--fg-on-dark-1); }
  .right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .ghost { padding: 8px 14px; border: 1px solid var(--hair-d2); border-radius: 4px; font: 500 13px/1 var(--font-body); color: var(--fg-on-dark-1); }
  .primary { padding: 8px 14px; background: var(--brand-red); border-radius: 4px; font: 500 13px/1 var(--font-body); color: #fff; }
  .hero { position: relative; padding: 36px 24px; }
  .eyebrow { font: 600 10px/1 var(--font-display); text-transform: uppercase; letter-spacing: 0.22em; color: var(--brand-red); margin-bottom: 12px; }
  .h { font: 600 36px/1.05 var(--font-display); letter-spacing: -0.02em; color: var(--fg-on-dark-1); max-width: 540px; }
  .live { position: absolute; right: 24px; top: 36px; display: inline-flex; align-items: center; gap: 8px; padding: 5px 10px 5px 8px; border-radius: 999px; background: rgba(230,14,27,0.1); border: 1px solid rgba(230,14,27,0.4); font: 500 11px/1 var(--font-mono); text-transform: uppercase; letter-spacing: 0.14em; color: var(--brand-red); }
  .live .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--brand-red); box-shadow: 0 0 10px var(--brand-red); }
</style>
</head><body>
  <div class="frame">
    <div class="nav">
      <div class="brand">
        <div class="mark"><img src="../assets/logo-mark.png" alt=""></div>
        <div class="word">KITOTECH</div>
      </div>
      <div class="links">
        <a class="active">Platform</a><a>Hardware</a><a>Solutions</a><a>Customers</a><a>Company</a>
      </div>
      <div class="right">
        <div class="ghost">Sign in</div>
        <div class="primary">Request demo</div>
      </div>
    </div>
    <div class="hero">
      <div class="live"><span class="dot"></span>1,240 channels live</div>
      <div class="eyebrow">Platform · Sentinel 4.2</div>
      <div class="h">Security infrastructure, engineered.</div>
    </div>
  </div>
</body></html>
