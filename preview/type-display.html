<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Display</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 32px 28px; }
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .label { display: flex; align-items: baseline; gap: 12px; }
  .tag { font: var(--mono-sm); color: var(--fg-on-light-3); letter-spacing: 0.1em; text-transform: uppercase; }
  .d1 { font: 700 92px/0.98 var(--font-display); letter-spacing: -0.03em; }
  .d2 { font: 600 64px/1.02 var(--font-display); letter-spacing: -0.025em; }
  .d3 { font: 600 44px/1.06 var(--font-display); letter-spacing: -0.02em; }
</style>
</head><body>
  <div class="stack">
    <div class="d1">Engineered.</div>
    <div class="label"><div class="d2">Always on.</div><span class="tag">Space Grotesk · 600</span></div>
    <div class="label"><div class="d3">Section heading</div><span class="tag">Display 3 · 44 / -0.02</span></div>
  </div>
</body></html>
