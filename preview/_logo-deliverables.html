<!doctype html>
<html><head><meta charset="utf-8"><title>Kitotech — Logo deliverables</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: Poppins, sans-serif; background: #F2F2F1; }
  .head { padding: 32px 40px; }
  .head h1 { font: 700 24px/1 Poppins; margin: 0 0 4px; }
  .head .sub { color: #76767D; font: 500 12px/1 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.14em; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .panel { padding: 48px 40px; display: flex; flex-direction: column; gap: 16px; align-items: center; justify-content: center; min-height: 280px; }
  .panel.light { background: #FFFFFF; }
  .panel.dark { background: #0A0A0C; }
  .panel.transparent { background:
    linear-gradient(45deg, #ddd 25%, transparent 25%) -8px 0,
    linear-gradient(-45deg, #ddd 25%, transparent 25%) -8px 0,
    linear-gradient(45deg, transparent 75%, #ddd 75%),
    linear-gradient(-45deg, transparent 75%, #ddd 75%);
    background-size: 16px 16px; background-color: #eee; }
  .lab { font: 500 11px/1 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.16em; color: #76767D; }
  .dark .lab { color: #6F6F76; }
  .panel img { max-width: 100%; max-height: 160px; }
  .icon-row { display: flex; gap: 32px; align-items: center; justify-content: center; }
  .icon-row img { height: 96px; }
</style>
</head><body>
  <div class="head">
    <h1>Kitotech Group LTD — Logo deliverables</h1>
    <div class="sub">Vector recreation · Red #E1141C · Blue #1A37D5</div>
  </div>
  <div class="grid">
    <div class="panel light">
      <img src="../assets/logo-horizontal-light.png" alt="">
      <div class="lab">Full horizontal · light bg · PNG / SVG</div>
    </div>
    <div class="panel dark">
      <img src="../assets/logo-horizontal-dark.png" alt="">
      <div class="lab">Full horizontal · dark bg · PNG / SVG</div>
    </div>
    <div class="panel transparent">
      <img src="../assets/logo-horizontal.png" alt="">
      <div class="lab">Transparent · web use</div>
    </div>
    <div class="panel light">
      <div class="icon-row">
        <img src="../assets/logo-mark.png" alt="">
        <img src="../assets/logo-mark-white.png" alt="" style="background:#0A0A0C; padding:8px; border-radius:8px;">
      </div>
      <div class="lab">Icon only · red & white variants</div>
    </div>
  </div>
</body></html>
